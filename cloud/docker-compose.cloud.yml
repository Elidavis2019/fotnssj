docker-compose.cloud.yml

# Deploy the cloud receiver separately from the school node.
# Usage:
#   docker-compose -f docker-compose.cloud.yml up -d
version: "3.9"

volumes:
  receiver_data:

services:
  receiver:
    build:
      context: .
      dockerfile: cloud/Dockerfile.receiver
    container_name: fotnssj-receiver
    restart: unless-stopped
    volumes:
      - receiver_data:/data/receiver
    ports:
      - "8080:8080"
    environment:
      - RECEIVER_DB=/data/receiver/trajectories.db
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3