nginx/nginx.conf

# ════════════════════════════════════════════════════════════════════════
# FOTNSSJ Nginx Reverse Proxy
# Terminates TLS, routes by subdomain or path prefix,
# enforces rate limiting and size limits at the edge.
# ════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain application/json text/html text/css;
    gzip_min_length 256;

    # ── Security ──────────────────────────────────────────────────────
    server_tokens off;
    client_max_body_size 64k;
    client_body_timeout  10s;
    client_header_timeout 10s;
    send_timeout 10s;

    # ── Rate limiting zones ───────────────────────────────────────────
    # Per-IP general limit
    limit_req_zone $binary_remote_addr zone=general:10m rate=30r/m;
    # Stricter limit for auth endpoints
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    # Answer submission
    limit_req_zone $binary_remote_addr zone=submit:10m rate=60r/m;

    limit_req_status 429;
    limit_conn_zone  $binary_remote_addr zone=addr:10m;
    limit_conn       addr 20;

    # ── Upstream containers ───────────────────────────────────────────
    upstream student_app {
        server student:5000;
        keepalive 8;
    }

    upstream viewer_app {
        server viewer:5000;
        keepalive 4;
    }

    upstream teacher_app {
        server teacher:5000;
        keepalive 4;
    }

    upstream admin_app {
        server admin:5000;
        keepalive 4;
    }

    # ── Common proxy headers ──────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ════════════════════════════════════════════════════════════════
    # HTTP → HTTPS redirect
    # ════════════════════════════════════════════════════════════════
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ════════════════════════════════════════════════════════════════
    # Student interface — primary public endpoint
    # ════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name ${STUDENT_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${STUDENT_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${STUDENT_DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # Health — no rate limit
        location /health {
            proxy_pass http://student_app;
            proxy_set_header Host $host;
            access_log off;
        }

        # Metrics — restrict to internal
        location /metrics {
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;
            proxy_pass http://student_app;
        }

        # Answer submission
        location /submit {
            limit_req zone=submit burst=10 nodelay;
            proxy_pass         http://student_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 15s;
        }

        # Station endpoints
        location /station/ {
            limit_req zone=submit burst=20 nodelay;
            proxy_pass         http://student_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # All other student routes
        location / {
            limit_req zone=general burst=20 nodelay;
            proxy_pass         http://student_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ════════════════════════════════════════════════════════════════
    # Admin + Teacher — separate subdomain, IP-restricted
    # ════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name ${ADMIN_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${ADMIN_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${ADMIN_DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;

        # Optional: restrict to school network
        # allow 203.0.113.0/24;
        # deny all;

        location /admin/login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass        http://admin_app;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location /teacher/login {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass        http://teacher_app;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location /teacher/ {
            limit_req zone=general burst=30 nodelay;
            proxy_pass        http://teacher_app;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }

        location / {
            limit_req zone=general burst=30 nodelay;
            proxy_pass        http://admin_app;
            proxy_set_header  Host $host;
            proxy_set_header  X-Real-IP $remote_addr;
            proxy_set_header  X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header  X-Forwarded-Proto $scheme;
        }
    }

    # ════════════════════════════════════════════════════════════════
    # Viewer — public read-only
    # ════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl http2;
        server_name ${VIEWER_DOMAIN};

        ssl_certificate     /etc/letsencrypt/live/${VIEWER_DOMAIN}/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/${VIEWER_DOMAIN}/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;

        location / {
            limit_req  zone=general burst=40 nodelay;
            proxy_pass http://viewer_app;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_cache_valid 200 10s;
        }
    }
}